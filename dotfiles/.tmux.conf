# ── Prefix ────────────────────────────────────────────────────
# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true color
set -g history-limit 50000
set -g mouse on                    # click to select panes, scroll
set -g base-index 1                # windows start at 1 not 0
setw -g pane-base-index 1
set -g renumber-windows on         # reorder windows when one closes
set -s escape-time 0               # no delay after Escape (crucial for vim)
set -g focus-events on

# ── Key Bindings ──────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with intuitive keys (| and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with Ctrl+hjkl (vim-style, no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes with Alt+arrows
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ── Status Bar ────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style bg=colour235,fg=colour250

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=colour39,bold] ❐ #S #[default]"

# Right: host + time
set -g status-right-length 60
set -g status-right "#[fg=colour245]%Y-%m-%d %H:%M #[fg=colour39]#H"

# Window tabs
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour39,bold] #I:#W "
setw -g window-status-current-style bg=colour238

# ── Copy Mode (vim keys) ───────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ── Plugins ───────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'    # sane defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save sessions
set -g @plugin 'christoomey/vim-tmux-navigator' # unified vim/tmux nav

set -g @continuum-restore 'on'   # auto-restore on tmux start

run '~/.tmux/plugins/tpm/tpm'
