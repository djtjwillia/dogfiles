version: '3'

# Load persona/env vars automatically if present
dotenv:
  - .env
  - env/.env

vars:
  DRY_RUN: '{{default "false" .DRY_RUN}}'
  DOTFILES_HOME: '{{default "$HOME/.dotfiles" .DOTFILES_HOME}}'
  DOTFILES_SRC: '{{default (printf "%s/dotfiles" .TASKFILE_DIR) .DOTFILES_SRC}}'
  GIT_TEMPLATE: '{{default "templates/gitconfig.tmpl" .GIT_TEMPLATE}}'
  SSH_TEMPLATE: '{{default "templates/ssh_config.tmpl" .SSH_TEMPLATE}}'
  PERSONA: '{{default "personal" .PERSONA}}'
  CONFIG_GIT: '{{default "true" .CONFIG_GIT}}'
  CONFIG_SSH: '{{default "true" .CONFIG_SSH}}'
  WINDSURF_SRC: '{{default "windsurf" .WINDSURF_SRC}}'
  WINDSURF_DEST: '{{default "$HOME/Library/Application Support/Windsurf/User" .WINDSURF_DEST}}'
  ITERM2_SRC: '{{default "iterm2/com.googlecode.iterm2.plist" .ITERM2_SRC}}'
  ITERM2_DEST: '{{default "$HOME/Library/Preferences/com.googlecode.iterm2.plist" .ITERM2_DEST}}'
  CLAUDE_SRC: '{{default "claude" .CLAUDE_SRC}}'
  CLAUDE_DEST: '{{default "$HOME/.claude" .CLAUDE_DEST}}'
  CLAUDE_SCHEDULED_DEST: '{{default "$HOME/Claude/Scheduled" .CLAUDE_SCHEDULED_DEST}}'

silent: true

tasks:
  default:
    desc: Alias for `task init`
    deps:
      - init

  init:
    desc: Run full bootstrap (prereqs → brew → dotfiles)
    cmds:
      - task: bootstrap:prereqs
      - task: brew:bundle
      - task: dotfiles:sync
      - task: tools:zshrc
      - task: config:git
      - task: config:ssh
      - task: tools:windsurf
      - task: tools:iterm2
      - task: tools:claude

  "bootstrap:prereqs":
    desc: Ensure oh-my-zsh and Homebrew are installed
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would install oh-my-zsh"
        else
          if [ ! -d "$HOME/.oh-my-zsh" ]; then
            echo "[bootstrap] Installing oh-my-zsh"
            RUNZSH=no KEEP_ZSHRC=yes sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
          else
            echo "[bootstrap] oh-my-zsh already installed"
          fi
        fi
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would install Homebrew"
        else
          if command -v brew >/dev/null 2>&1; then
            echo "[bootstrap] Homebrew already installed"
          else
            echo "[bootstrap] Installing Homebrew"
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
        fi

  "brew:bundle":
    desc: Install packages defined in Brewfile
    deps:
      - "bootstrap:prereqs"
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would run brew bundle"
        else
          echo "[brew] Running brew bundle"
          brew bundle --file Brewfile
        fi
    sources:
      - Brewfile
    generates:
      - Brewfile.lock.json

  "brew:dump":
    desc: Refresh Brewfile from current system state
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would regenerate Brewfile"
        else
          echo "[brew] Dumping Brewfile"
          brew bundle dump --file Brewfile --force
        fi

  "dotfiles:sync":
    desc: Copy dotfiles config into ~/.dotfiles
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would ensure {{.DOTFILES_HOME}} exists"
          echo "[dry-run] Would sync dotfiles from {{.DOTFILES_SRC}}"
        else
          echo "[dotfiles] Syncing to {{.DOTFILES_HOME}}"
          mkdir -p {{.DOTFILES_HOME}}
          rsync -a {{.DOTFILES_SRC}}/config.sh {{.DOTFILES_HOME}}/config.sh
          rsync -a {{.DOTFILES_SRC}}/gitconfig {{.DOTFILES_HOME}}/gitconfig
        fi
    sources:
      - "{{.DOTFILES_SRC}}/config.sh"
      - "{{.DOTFILES_SRC}}/gitconfig"

  "dotfiles:pull":
    desc: Copy home dotfiles back into repo for editing
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would copy from {{.DOTFILES_HOME}} back to repo"
        else
          echo "[dotfiles] Pulling from {{.DOTFILES_HOME}}"
          rsync -a {{.DOTFILES_HOME}}/config.sh {{.DOTFILES_SRC}}/config.sh
          rsync -a {{.DOTFILES_HOME}}/gitconfig {{.DOTFILES_SRC}}/gitconfig
        fi

  "tools:zshrc":
    desc: Copy zshrc into ~/.zshrc
    cmds:
      - |
        set -euo pipefail
        TARGET="$HOME/.zshrc"
        SRC="{{.DOTFILES_SRC}}/.zshrc"
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would copy $SRC to $TARGET"
        else
          echo "[shell] Copying $SRC to $TARGET"
          install -m 0644 "$SRC" "$TARGET"
        fi

  "config:git":
    desc: Generate persona-specific gitconfig files
    cmds:
      - |
        set -euo pipefail
        if [ "{{.CONFIG_GIT}}" != "true" ]; then
          echo "[identities] CONFIG_GIT=false; skipping git setup"
          exit 0
        fi
        if ! command -v envsubst >/dev/null 2>&1; then
          echo "[identities] envsubst is required for git templating" >&2
          exit 1
        fi
        dry="{{.DRY_RUN}}"
        persona="{{.PERSONA}}"
        case "$persona" in
          both) personas="personal work" ;;
          personal|work) personas="$persona" ;;
          *) echo "[identities] Unknown PERSONA=$persona" >&2; exit 1 ;;
        esac
        base_src="dotfiles/gitconfig"
        if [ ! -f "$base_src" ]; then
          echo "[identities] Missing $base_src" >&2
          exit 1
        fi
        if [ "$dry" = "true" ]; then
          echo "[dry-run] Would copy $base_src to $HOME/.gitconfig"
        else
          echo "[identities] Installing base gitconfig"
          install -m 0644 "$base_src" "$HOME/.gitconfig"
        fi
        get_var() {
          eval "printf '%s' \"\${$1:-}\""
        }
        for p in $personas; do
          upper=$(printf '%s' "$p" | tr '[:lower:]' '[:upper:]')
          name=$(get_var "GIT_USER_${upper}")
          email=$(get_var "GIT_EMAIL_${upper}")
          signing=$(get_var "GIT_SIGNINGKEY_${upper}")
          extra=$(get_var "GIT_EXTRA_${upper}")
          if [ -z "$name" ] || [ -z "$email" ] || [ -z "$signing" ]; then
            echo "[identities] Missing git env vars for persona $p" >&2
            exit 1
          fi
          target="$HOME/.gitconfig-$p"
          if [ "$dry" = "true" ]; then
            echo "[dry-run] Would render git persona $p -> $target"
          else
            echo "[identities] Rendering git persona $p -> $target"
            GIT_NAME="$name" GIT_EMAIL="$email" GIT_SIGNINGKEY="$signing" GIT_EXTRA="$extra" envsubst < {{.GIT_TEMPLATE}} > "$target"
            chmod 0644 "$target"
          fi
        done

  "config:ssh":
    desc: Generate persona-specific SSH config
    cmds:
      - |
        set -euo pipefail
        if [ "{{.CONFIG_SSH}}" != "true" ]; then
          echo "[identities] CONFIG_SSH=false; skipping ssh setup"
          exit 0
        fi
        if ! command -v envsubst >/dev/null 2>&1; then
          echo "[identities] envsubst is required for ssh templating" >&2
          exit 1
        fi
        dry="{{.DRY_RUN}}"
        persona="{{.PERSONA}}"
        case "$persona" in
          both) personas="personal work" ;;
          personal|work) personas="$persona" ;;
          *) echo "[identities] Unknown PERSONA=$persona" >&2; exit 1 ;;
        esac
        mkdir -p "$HOME/.ssh"
        chmod 700 "$HOME/.ssh"
        if [ "$dry" != "true" ]; then
          tmp=$(mktemp)
          trap 'rm -f "$tmp"' EXIT
        fi
        get_var() {
          eval "printf '%s' \"\${$1:-}\""
        }
        rendered=false
        for p in $personas; do
          upper=$(printf '%s' "$p" | tr '[:lower:]' '[:upper:]')
          host=$(get_var "SSH_HOST_${upper}")
          hostname=$(get_var "SSH_HOSTNAME_${upper}")
          identity=$(get_var "SSH_IDENTITY_${upper}")
          extra=$(get_var "SSH_EXTRA_${upper}")
          if [ -z "$host" ] || [ -z "$hostname" ] || [ -z "$identity" ]; then
            echo "[identities] Missing SSH env vars for persona $p; skipping"
            continue
          fi
          if [ "$dry" = "true" ]; then
            echo "[dry-run] Would add SSH host $host ($p)"
          else
            SSH_HOST="$host" SSH_HOSTNAME="$hostname" SSH_IDENTITY="$identity" SSH_EXTRA="$extra" envsubst < {{.SSH_TEMPLATE}} >> "$tmp"
            echo >> "$tmp"
            rendered=true
          fi
        done
        if [ "$dry" = "true" ]; then
          echo "[dry-run] Would write SSH config to $HOME/.ssh/config"
        else
          if [ "$rendered" = true ]; then
            install -m 0600 "$tmp" "$HOME/.ssh/config"
            echo "[identities] Updated $HOME/.ssh/config"
          else
            echo "[identities] No SSH entries rendered; existing config left untouched"
          fi
        fi

  "tools:windsurf":
    desc: Sync Windsurf settings/keybindings/snippets into the user profile
    cmds:
      - |
        set -euo pipefail
        src="{{.WINDSURF_SRC}}"
        dest="{{.WINDSURF_DEST}}"
        if [ ! -d "$src" ]; then
          echo "[ides] Windsurf source folder $src not found; skipping"
          exit 0
        fi
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would sync Windsurf settings from $src to $dest"
          exit 0
        fi
        mkdir -p "$dest"
        rsync -a --delete "$src"/ "$dest"/
        echo "[ides] Synced Windsurf settings to $dest"

  "tools:iterm2":
    desc: Install iTerm2 preferences plist
    cmds:
      - |
        set -euo pipefail
        src="{{.ITERM2_SRC}}"
        dest="{{.ITERM2_DEST}}"
        if [ ! -f "$src" ]; then
          echo "[tools] iTerm2 source $src not found; skipping"
          exit 0
        fi
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would copy $src to $dest"
          exit 0
        fi
        mkdir -p "$(dirname "$dest")"
        install -m 0600 "$src" "$dest"
        echo "[tools] Installed iTerm2 preferences to $dest"

  "tools:claude":
    desc: Sync Claude config, agents, and scheduled scripts into place
    cmds:
      - |
        set -euo pipefail
        src="{{.CLAUDE_SRC}}"
        dest="{{.CLAUDE_DEST}}"
        scheduled_dest="{{.CLAUDE_SCHEDULED_DEST}}"
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would mkdir -p $dest"
          echo "[dry-run] Would install -m 0644 $src/CLAUDE.md $dest/CLAUDE.md"
          echo "[dry-run] Would install -m 0644 $src/charter-details.md $dest/charter-details.md"
          echo "[dry-run] Would install -m 0644 $src/settings.json $dest/settings.json"
          echo "[dry-run] Would rsync --dry-run --delete-after $src/agents/ $dest/agents/"
          echo "[dry-run] Would rsync $src/scheduled/ $scheduled_dest/"
          exit 0
        fi
        mkdir -p "$dest"
        install -m 0644 "$src/CLAUDE.md" "$dest/CLAUDE.md"
        echo "[claude] Installed CLAUDE.md to $dest"
        install -m 0644 "$src/charter-details.md" "$dest/charter-details.md"
        echo "[claude] Installed charter-details.md to $dest"
        install -m 0644 "$src/settings.json" "$dest/settings.json"
        echo "[claude] Installed settings.json to $dest"
        AGENTS_DEST="$dest/agents/"
        case "$AGENTS_DEST" in
          */agents/) ;;
          *) echo "[claude] ERROR: refusing delete — target is not an agents/ leaf: $AGENTS_DEST" >&2; exit 1 ;;
        esac
        mkdir -p "$AGENTS_DEST"
        rsync -a --delete-after --filter='P .DS_Store' "$src/agents/" "$AGENTS_DEST"
        echo "[claude] Synced agents/ to $AGENTS_DEST"
        mkdir -p "$scheduled_dest"
        rsync -a "$src/scheduled/" "$scheduled_dest/"
        echo "[claude] Synced scheduled/ to $scheduled_dest"

  "scheduled:install":
    desc: Install and load the daily briefing launch agent (run manually — not part of init)
    cmds:
      - |
        set -euo pipefail
        plist_src="{{.CLAUDE_SCHEDULED_DEST}}/taylor-morning-briefing/com.taylor.daily-briefing.plist"
        plist_dest="$HOME/Library/LaunchAgents/com.taylor.daily-briefing.plist"
        script="{{.CLAUDE_SCHEDULED_DEST}}/taylor-morning-briefing/run-briefing.sh"
        output_logs="$HOME/Claude/briefing-output/.logs"
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would mkdir -p $output_logs"
          echo "[dry-run] Would backup $plist_dest to /tmp/com.taylor.daily-briefing.plist.bak"
          echo "[dry-run] Would launchctl unload $plist_dest"
          echo "[dry-run] Would install -m 0644 $plist_src $plist_dest"
          echo "[dry-run] Would chmod +x $script"
          echo "[dry-run] Would launchctl load $plist_dest"
          exit 0
        fi
        mkdir -p "$output_logs"
        echo "[scheduled] Created $output_logs"
        if [ -f "$plist_dest" ]; then
          cp "$plist_dest" "/tmp/com.taylor.daily-briefing.plist.bak"
          echo "[scheduled] Backed up existing plist to /tmp/com.taylor.daily-briefing.plist.bak"
        fi
        launchctl unload "$plist_dest" 2>/dev/null || true
        echo "[scheduled] Unloaded existing agent (if any)"
        install -m 0644 "$plist_src" "$plist_dest"
        echo "[scheduled] Installed plist to $plist_dest"
        chmod +x "$script"
        echo "[scheduled] Set +x on $script"
        launchctl load "$plist_dest"
        echo "[scheduled] Loaded com.taylor.daily-briefing"
