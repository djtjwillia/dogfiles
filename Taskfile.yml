version: '3'

vars:
  DRY_RUN: '{{default "false" .DRY_RUN}}'
  DOTFILES_HOME: '{{default "$HOME/.dotfiles" .DOTFILES_HOME}}'
  DOTFILES_SRC: '{{default (printf "%s/dotfiles" .TASKFILE_DIR) .DOTFILES_SRC}}'
  ITERM2_SRC: '{{default "iterm2/com.googlecode.iterm2.plist" .ITERM2_SRC}}'
  ITERM2_DEST: '{{default "$HOME/Library/Preferences/com.googlecode.iterm2.plist" .ITERM2_DEST}}'
  CLAUDE_SRC: '{{default "claude" .CLAUDE_SRC}}'
  CLAUDE_DEST: '{{default "$HOME/.claude" .CLAUDE_DEST}}'

silent: true

tasks:
  default:
    desc: Alias for `task init`
    deps:
      - init

  help:
    desc: List all available tasks
    cmds:
      - task --list

  "dry-run":
    desc: Preview what `task init` would do without making changes
    cmds:
      - task init DRY_RUN=true

  init:
    desc: Run full bootstrap (prereqs → brew → dotfiles)
    cmds:
      - task: brew:bundle        # brew:bundle deps bootstrap:prereqs — runs it once
      - task: dotfiles:sync
      - task: tools:zshrc
      - task: config:git
      - task: tools:iterm2
      - task: tools:p10k
      - task: tools:tmux
      - task: tools:dev-script
      - task: tools:claude
      - task: tools:node

  "bootstrap:prereqs":
    desc: Ensure oh-my-zsh and Homebrew are installed
    cmds:
      - |
        set -euo pipefail
        ZSH_CUSTOM="${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}"
        if [ "{{.DRY_RUN}}" = "true" ]; then
          [ -d "$HOME/.oh-my-zsh" ] \
            && echo "[ok] oh-my-zsh: already installed" \
            || echo "[change] oh-my-zsh: would install"
          command -v brew >/dev/null 2>&1 \
            && echo "[ok] Homebrew: already installed" \
            || echo "[change] Homebrew: would install"
          [ -d "$HOME/.tmux/plugins/tpm" ] \
            && echo "[ok] tpm: already present" \
            || echo "[change] tpm: would clone"
          [ -d "$ZSH_CUSTOM/plugins/zsh-autosuggestions" ] \
            && echo "[ok] zsh-autosuggestions: already present" \
            || echo "[change] zsh-autosuggestions: would clone"
          [ -d "$ZSH_CUSTOM/plugins/zsh-syntax-highlighting" ] \
            && echo "[ok] zsh-syntax-highlighting: already present" \
            || echo "[change] zsh-syntax-highlighting: would clone"
        else
          if [ ! -d "$HOME/.oh-my-zsh" ]; then
            echo "[bootstrap] Installing oh-my-zsh"
            RUNZSH=no KEEP_ZSHRC=yes sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
          else
            echo "[bootstrap] oh-my-zsh already installed"
          fi
          if command -v brew >/dev/null 2>&1; then
            echo "[bootstrap] Homebrew already installed"
          else
            echo "[bootstrap] Installing Homebrew"
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          if [ ! -d "$HOME/.tmux/plugins/tpm" ]; then
            echo "[bootstrap] Cloning tpm (tmux plugin manager)"
            git clone https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm"
          else
            echo "[bootstrap] tpm already present"
          fi
          if [ ! -d "$ZSH_CUSTOM/plugins/zsh-autosuggestions" ]; then
            echo "[bootstrap] Cloning zsh-autosuggestions"
            git clone https://github.com/zsh-users/zsh-autosuggestions "$ZSH_CUSTOM/plugins/zsh-autosuggestions"
          else
            echo "[bootstrap] zsh-autosuggestions already present"
          fi
          if [ ! -d "$ZSH_CUSTOM/plugins/zsh-syntax-highlighting" ]; then
            echo "[bootstrap] Cloning zsh-syntax-highlighting"
            git clone https://github.com/zsh-users/zsh-syntax-highlighting "$ZSH_CUSTOM/plugins/zsh-syntax-highlighting"
          else
            echo "[bootstrap] zsh-syntax-highlighting already present"
          fi
        fi

  "brew:bundle":
    desc: Install packages defined in Brewfile
    deps:
      - "bootstrap:prereqs"
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          if HOMEBREW_NO_AUTO_UPDATE=1 brew bundle check --file Brewfile >/dev/null 2>&1; then
            echo "[ok] brew bundle: all packages satisfied"
          else
            missing=$(HOMEBREW_NO_AUTO_UPDATE=1 brew bundle check --file Brewfile 2>&1 \
              | grep -cE '^\s*(brew|cask|mas|tap):' || true)
            echo "[change] brew bundle: $missing package(s) would be installed"
          fi
          outdated=$(HOMEBREW_NO_AUTO_UPDATE=1 brew outdated --quiet 2>/dev/null | wc -l | tr -d ' ')
          if [ "$outdated" -gt 0 ]; then
            echo "[change] brew outdated: $outdated package(s) have updates available"
            HOMEBREW_NO_AUTO_UPDATE=1 brew outdated --quiet 2>/dev/null | sed 's/^/  /'
          else
            echo "[ok] brew outdated: all packages up to date"
          fi
        else
          echo "[brew] Running brew bundle"
          brew bundle --file Brewfile
        fi
    sources:
      - Brewfile
    generates:
      - Brewfile.lock.json

  "brew:dump":
    desc: Refresh Brewfile from current system state
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would regenerate Brewfile"
        else
          echo "[brew] Dumping Brewfile"
          brew bundle dump --file Brewfile --force
        fi

  "dotfiles:sync":
    desc: Copy dotfiles config into ~/.dotfiles
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          for f in config.sh gitconfig; do
            src_file="{{.DOTFILES_SRC}}/$f"
            dest_file="{{.DOTFILES_HOME}}/$f"
            if [ ! -f "$dest_file" ]; then
              echo "[change] dotfiles/$f: would create (not present)"
            elif cmp -s "$src_file" "$dest_file"; then
              echo "[ok] dotfiles/$f: identical"
            else
              echo "[change] dotfiles/$f: would update"
            fi
          done
        else
          echo "[dotfiles] Syncing to {{.DOTFILES_HOME}}"
          mkdir -p {{.DOTFILES_HOME}}
          rsync -a {{.DOTFILES_SRC}}/config.sh {{.DOTFILES_HOME}}/config.sh
          rsync -a {{.DOTFILES_SRC}}/gitconfig {{.DOTFILES_HOME}}/gitconfig
        fi
    sources:
      - "{{.DOTFILES_SRC}}/config.sh"
      - "{{.DOTFILES_SRC}}/gitconfig"

  "dotfiles:pull":
    desc: Copy home dotfiles back into repo for editing
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "[dry-run] Would copy from {{.DOTFILES_HOME}} back to repo"
        else
          echo "[dotfiles] Pulling from {{.DOTFILES_HOME}}"
          rsync -a {{.DOTFILES_HOME}}/config.sh {{.DOTFILES_SRC}}/config.sh
          rsync -a {{.DOTFILES_HOME}}/gitconfig {{.DOTFILES_SRC}}/gitconfig
        fi

  "tools:zshrc":
    desc: Copy zshrc into ~/.zshrc
    cmds:
      - |
        set -euo pipefail
        SRC="{{.DOTFILES_SRC}}/.zshrc"
        TARGET="$HOME/.zshrc"
        if [ "{{.DRY_RUN}}" = "true" ]; then
          if [ ! -f "$TARGET" ]; then
            echo "[change] .zshrc: would create (not present)"
          elif cmp -s "$SRC" "$TARGET"; then
            echo "[ok] .zshrc: identical"
          else
            echo "[change] .zshrc: would update"
          fi
        else
          echo "[shell] Copying $SRC to $TARGET"
          install -m 0644 "$SRC" "$TARGET"
        fi

  "tools:tmux":
    desc: Install .tmux.conf into ~/.tmux.conf
    cmds:
      - |
        set -euo pipefail
        SRC="{{.DOTFILES_SRC}}/.tmux.conf"
        TARGET="$HOME/.tmux.conf"
        if [ "{{.DRY_RUN}}" = "true" ]; then
          if [ ! -f "$TARGET" ]; then
            echo "[change] .tmux.conf: would create (not present)"
          elif cmp -s "$SRC" "$TARGET"; then
            echo "[ok] .tmux.conf: identical"
          else
            echo "[change] .tmux.conf: would update"
          fi
        else
          echo "[tmux] Installing $SRC to $TARGET"
          install -m 0644 "$SRC" "$TARGET"
        fi

  "tools:p10k":
    desc: Install .p10k.zsh config into ~/.p10k.zsh
    cmds:
      - |
        set -euo pipefail
        SRC="{{.DOTFILES_SRC}}/.p10k.zsh"
        TARGET="$HOME/.p10k.zsh"
        if [ ! -f "$SRC" ]; then
          echo "[p10k] No .p10k.zsh in dotfiles yet; skipping (run the p10k wizard then commit it)"
          exit 0
        fi
        if [ "{{.DRY_RUN}}" = "true" ]; then
          if [ ! -f "$TARGET" ]; then
            echo "[change] .p10k.zsh: would create (not present)"
          elif cmp -s "$SRC" "$TARGET"; then
            echo "[ok] .p10k.zsh: identical"
          else
            echo "[change] .p10k.zsh: would update"
          fi
        else
          echo "[p10k] Installing $SRC to $TARGET"
          install -m 0644 "$SRC" "$TARGET"
        fi

  "config:git":
    desc: Install base gitconfig + per-identity includes + allowed_signers
    cmds:
      - |
        set -euo pipefail
        SRC="{{.DOTFILES_SRC}}"
        if [ "{{.DRY_RUN}}" = "true" ]; then
          for pair in \
            "gitconfig:$HOME/.gitconfig" \
            "gitconfig-liatrio:$HOME/.gitconfig-liatrio" \
            "gitconfig-personal:$HOME/.gitconfig-personal" \
            "allowed_signers:$HOME/.ssh/allowed_signers"; do
            src_file="${pair%%:*}"
            dest_file="${pair##*:}"
            label="$(basename "$dest_file")"
            if [ ! -f "$dest_file" ]; then
              echo "[change] $label: would create (not present)"
            elif cmp -s "$SRC/$src_file" "$dest_file"; then
              echo "[ok] $label: identical"
            else
              echo "[change] $label: would update"
            fi
          done
        else
          echo "[identities] Installing base gitconfig"
          install -m 0644 "$SRC/gitconfig" "$HOME/.gitconfig"
          echo "[identities] Installing per-identity includes"
          install -m 0644 "$SRC/gitconfig-liatrio" "$HOME/.gitconfig-liatrio"
          install -m 0644 "$SRC/gitconfig-personal" "$HOME/.gitconfig-personal"
          echo "[identities] Installing allowed_signers"
          mkdir -p "$HOME/.ssh"; chmod 700 "$HOME/.ssh"
          install -m 0644 "$SRC/allowed_signers" "$HOME/.ssh/allowed_signers"
        fi

  "tools:iterm2":
    desc: Install iTerm2 preferences plist
    cmds:
      - |
        set -euo pipefail
        src="{{.ITERM2_SRC}}"
        dest="{{.ITERM2_DEST}}"
        if [ ! -f "$src" ]; then
          echo "[tools] iTerm2 source $src not found; skipping"
          exit 0
        fi
        if [ "{{.DRY_RUN}}" = "true" ]; then
          if [ ! -f "$dest" ]; then
            echo "[change] iterm2 plist: would create (not present)"
          elif cmp -s "$src" "$dest"; then
            echo "[ok] iterm2 plist: identical"
          else
            echo "[change] iterm2 plist: would update"
          fi
          exit 0
        fi
        mkdir -p "$(dirname "$dest")"
        install -m 0600 "$src" "$dest"
        echo "[tools] Installed iTerm2 preferences to $dest"

  "tools:dev-script":
    desc: Install dev workspace startup script to ~/.local/bin/dev
    cmds:
      - |
        set -euo pipefail
        SRC="{{.DOTFILES_SRC}}/dev"
        TARGET="$HOME/.local/bin/dev"
        if [ "{{.DRY_RUN}}" = "true" ]; then
          if [ ! -f "$TARGET" ]; then
            echo "[change] dev: would create (not present)"
          elif cmp -s "$SRC" "$TARGET"; then
            echo "[ok] dev: identical"
          else
            echo "[change] dev: would update"
          fi
        else
          mkdir -p "$HOME/.local/bin"
          install -m 0755 "$SRC" "$TARGET"
          echo "[dev] Installed workspace startup script to $TARGET"
        fi

  "tools:claude":
    desc: Sync Claude config, agents, and commands into place
    cmds:
      - |
        set -euo pipefail
        src="{{.CLAUDE_SRC}}"
        dest="{{.CLAUDE_DEST}}"
        if [ "{{.DRY_RUN}}" = "true" ]; then
          for f in CLAUDE.md charter-details.md settings.json statusline-command.sh; do
            if [ ! -f "$dest/$f" ]; then
              echo "[change] $f: would create (not present)"
            elif cmp -s "$src/$f" "$dest/$f"; then
              echo "[ok] $f: identical"
            else
              echo "[change] $f: would update"
            fi
          done
          if [ -d "$dest/agents" ]; then
            changes=$(rsync -a --delete-after --dry-run --itemize-changes \
              --filter='P .DS_Store' "$src/agents/" "$dest/agents/" 2>/dev/null \
              | grep -v '^$' | wc -l | tr -d ' ') || true
            if [ "$changes" -eq 0 ]; then
              echo "[ok] agents/: no changes"
            else
              echo "[change] agents/: $changes file(s) would change"
              rsync -a --delete-after --dry-run --itemize-changes \
                --filter='P .DS_Store' "$src/agents/" "$dest/agents/" 2>/dev/null \
                | grep -v '^$' | sed 's/^/  /'
            fi
          else
            echo "[change] agents/: would create and populate"
          fi
          if [ -d "$src/commands" ]; then
            if [ -d "$dest/commands" ]; then
              changes=$(rsync -a --dry-run --itemize-changes \
                --filter='P .DS_Store' "$src/commands/" "$dest/commands/" 2>/dev/null \
                | grep -v '^$' | wc -l | tr -d ' ') || true
              if [ "$changes" -eq 0 ]; then
                echo "[ok] commands/: no changes"
              else
                echo "[change] commands/: $changes file(s) would change"
                rsync -a --dry-run --itemize-changes \
                  --filter='P .DS_Store' "$src/commands/" "$dest/commands/" 2>/dev/null \
                  | grep -v '^$' | sed 's/^/  /'
              fi
            else
              echo "[change] commands/: would create and populate"
            fi
          fi
          exit 0
        fi
        mkdir -p "$dest"
        install -m 0644 "$src/CLAUDE.md" "$dest/CLAUDE.md"
        install -m 0644 "$src/charter-details.md" "$dest/charter-details.md"
        install -m 0644 "$src/settings.json" "$dest/settings.json"
        install -m 0755 "$src/statusline-command.sh" "$dest/statusline-command.sh"
        echo "[claude] Installed config files to $dest"
        # agents/ is a mirror — --delete prunes agents removed from the repo.
        mkdir -p "$dest/agents/"
        rsync -a --delete-after --filter='P .DS_Store' "$src/agents/" "$dest/agents/"
        echo "[claude] Synced agents/ (mirror) to $dest/agents/"
        # commands/ is ADDITIVE — no --delete; SDD-* commands live here from elsewhere.
        if [ -d "$src/commands" ]; then
          mkdir -p "$dest/commands/"
          rsync -a --filter='P .DS_Store' "$src/commands/" "$dest/commands/"
          echo "[claude] Synced commands/ (additive) to $dest/commands/"
        fi

  "tools:node":
    desc: Install LTS Node via NVM and global npm packages (agent-browser)
    cmds:
      - |
        set -euo pipefail
        if [ "{{.DRY_RUN}}" = "true" ]; then
          # Source nvm and check state inside a real bash subprocess — mvdan.cc/sh
          # (task's embedded interpreter) panics on fd 3 which nvm opens internally.
          nvm_info=$(bash -c '
            export NVM_DIR="$HOME/.nvm"
            [ -s "/opt/homebrew/opt/nvm/nvm.sh" ] && . "/opt/homebrew/opt/nvm/nvm.sh"
            if command -v nvm >/dev/null 2>&1; then
              lts_ver=$(nvm version lts 2>/dev/null || echo "N/A")
              echo "nvm:$lts_ver"
            else
              echo "nvm:missing"
            fi
            npm list -g agent-browser >/dev/null 2>&1 \
              && echo "agent-browser:ok" \
              || echo "agent-browser:missing"
          ' 2>/dev/null || true)
          case "$nvm_info" in
            *"nvm:missing"*)  echo "[change] node: nvm not found, would need Homebrew install first" ;;
            *"nvm:N/A"*)      echo "[change] node: LTS not installed, would run nvm install --lts" ;;
            *)
              lts_ver=$(printf '%s' "$nvm_info" | grep "^nvm:" | cut -d: -f2)
              echo "[ok] node: LTS ($lts_ver) already installed" ;;
          esac
          case "$nvm_info" in
            *"agent-browser:ok"*)      echo "[ok] agent-browser: already installed globally" ;;
            *"agent-browser:missing"*) echo "[change] agent-browser: would install globally" ;;
          esac
        else
          echo "[node] Installing LTS Node via NVM"
          bash -c '
            export NVM_DIR="$HOME/.nvm"
            [ -s "/opt/homebrew/opt/nvm/nvm.sh" ] && . "/opt/homebrew/opt/nvm/nvm.sh"
            nvm install --lts
            nvm use --lts
            echo "[node] Installing global npm packages"
            npm install -g agent-browser
            echo "[node] Node setup complete"
          '
        fi
